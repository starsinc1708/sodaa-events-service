services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-events}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-events}"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-app}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-app}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  migrate:
    image: migrate/migrate:v4.18.1
    restart: on-failure
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-events}?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: api
    ports:
      - "50051:50051"
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-events}?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-events}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-events.dlq}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-event-stats-worker}
      CLICKHOUSE_ENABLED: ${CLICKHOUSE_ENABLED:-false}
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-app}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-app}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: worker
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-events}?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-events}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-events.dlq}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-event-stats-worker}
      CLICKHOUSE_ENABLED: ${CLICKHOUSE_ENABLED:-false}
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-app}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-app}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_started
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  chdata: